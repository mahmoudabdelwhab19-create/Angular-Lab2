<app-btn-night #btn></app-btn-night>

<app-total-price [totalPrice]="productsComp.totalPrice"></app-total-price>

<app-selector #selector 
  (categoryChanged)="productsComp.filterProducts($event); productsComp.sort(radioComp.selectedSort)">
</app-selector>

<app-radio #radioComp 
  (sortChanged)="productsComp.selectedSort = $event; productsComp.sort($event)">
</app-radio>

<app-products #productsComp
  [isNight]="btn.isActivee" 
  [selectedCategory]="selector.selectedId" 
  [selectedSort]="radioComp.selectedSort"
  (totalPriceChange)="productsComp.totalPrice = $any($event)"> 
</app-products>
